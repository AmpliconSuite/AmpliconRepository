[pytest]
# Test discovery
testpaths = tests

# Marks used in this project
markers =
    slow: marks tests that run the full aggregation pipeline (may take several minutes)
    integration: marks tests that require a live MongoDB connection

# Disable broken third-party pytest plugins in the global Python environment.
# -q          : compact output
# --tb=short  : short tracebacks
# -r a        : always show the full A(ll) result summary at the end
addopts = -p no:logfire -p no:django -q --tb=short -r a -W ignore
