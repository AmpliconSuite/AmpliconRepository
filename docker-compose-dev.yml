version: "3.9"

services:

  amplrepdev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AA_USER: ${AA_USER}
        AA_GROUP: ${AA_GROUP}
        UID: ${UID}
        GID: ${GID}
#        ACCOUNT_AUTHENTICATED_LOGIN_REDIRECTS: ${ACCOUNT_AUTHENTICATED_LOGIN_REDIRECTS}
#        GOOGLE_SECRET_KEY: ${GOOGLE_SECRET_KEY}
#        GLOBUS_SECRET_KEY: ${GLOBUS_SECRET_KEY}
#        ACCOUNT_DEFAULT_HTTP_PROTOCOL: ${ACCOUNT_DEFAULT_HTTP_PROTOCOL}
#        SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT}
#        DB_URI_SECRET: ${DB_URI_SECRET}
#        S3_FILE_DOWNLOADS: ${S3_FILE_DOWNLOADS}
#        AWS_PROFILE_NAME: ${AWS_PROFILE_NAME}
#        S3_DOWNLOADS_BUCKET_PATH: ${S3_DOWNLOADS_BUCKET_PATH}
    image: genepattern/amplicon-repo:${AMPLICON_ENV}
    container_name: ${CONTAINER_NAME}
    restart: always
    privileged: true
    # .env is not need to be specified, all the variales will be set as environment parameters in the container
    # however if you specify .env then you can see all the variables if you do docker-compose -f docker-compose-dev.yml config
    env_file: .env
    environment:
      - AA_USER=${AA_USER}
      - AA_GROUP=${AA_GROUP}
      - UID=${UID}
      - GID=${GID}
      - AMPLICON_ENV=${AMPLICON_ENV}
      - AMPLICON_ENV_PORT=${AMPLICON_ENV_PORT}
      - ACCOUNT_AUTHENTICATED_LOGIN_REDIRECTS=${ACCOUNT_AUTHENTICATED_LOGIN_REDIRECTS}
      - GOOGLE_SECRET_KEY=${GOOGLE_SECRET_KEY}
      - GLOBUS_SECRET_KEY=${GLOBUS_SECRET_KEY}
      - ACCOUNT_DEFAULT_HTTP_PROTOCOL=${ACCOUNT_DEFAULT_HTTP_PROTOCOL}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT}
      - DB_URI_SECRET=${DB_URI_SECRET}
      - S3_FILE_DOWNLOADS=${S3_FILE_DOWNLOADS}
      - AWS_PROFILE_NAME=${AWS_PROFILE_NAME}
      - S3_DOWNLOADS_BUCKET_PATH=${S3_DOWNLOADS_BUCKET_PATH}
      - CONTAINER_NAME=${CONTAINER_NAME}
      # boto3 locates ~/.aws (config, credentials, and the SSO token cache) via HOME.
      # Must match the mounted path below and the container user's home (AA_USER).
      - HOME=/home/${AA_USER}
    ports:
      - '${AMPLICON_ENV_PORT}:8000'
    volumes:
      # Mount the host's AWS dir (config + credentials + sso/cache) into the
      # container user's home so it reuses the SSO token from `aws sso login`
      # run on the host. Read-only: login/refresh happens on the host, not here.
      - ${HOME}/.aws:/home/${AA_USER}/.aws:ro
      - ${PWD}/logs:/logs
      # might want to mount the temp files on the local machine
      - ${PWD}/tmp:/tmp
      - ${PWD}/.git:/srv/.git
      # mount your code
      - ${PWD}:/srv/:rw
    user: "${UID}:${GID}"
    depends_on:
      - mongodb
    links:
      - mongodb

  mongodb:
    image: mongo:4
    volumes:
      - ${PWD}/data:/data/db
    ports:
      - '27017:27017'

networks:
  default:

